<meta charset="utf-8">
<title>CID Orto · SUS</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<style>
:root{
  --bg:#F6F8F7; --surface:#FFFFFF; --ink:#1A2421; --ink-2:#5A6763; --ink-3:#8A948F;
  --line:#DFE6E3; --accent:#0E7C6B; --accent-ink:#FFFFFF; --accent-soft:#E3F0ED;
  --amber:#B07D2B; --amber-soft:#F5EBD9; --sel:#0E7C6B14;
  --radius:10px; --mono:ui-monospace,'Cascadia Mono',Consolas,'SF Mono',Menlo,monospace;
}
@media (prefers-color-scheme: dark){:root{
  --bg:#0F1513; --surface:#171F1C; --ink:#E4EBE8; --ink-2:#9AA8A2; --ink-3:#6B7873;
  --line:#26312D; --accent:#4CC9B0; --accent-ink:#08211B; --accent-soft:#1B2E29;
  --amber:#D9A85A; --amber-soft:#31281A; --sel:#4CC9B01F;
}}
:root[data-theme="light"]{
  --bg:#F6F8F7; --surface:#FFFFFF; --ink:#1A2421; --ink-2:#5A6763; --ink-3:#8A948F;
  --line:#DFE6E3; --accent:#0E7C6B; --accent-ink:#FFFFFF; --accent-soft:#E3F0ED;
  --amber:#B07D2B; --amber-soft:#F5EBD9; --sel:#0E7C6B14;
}
:root[data-theme="dark"]{
  --bg:#0F1513; --surface:#171F1C; --ink:#E4EBE8; --ink-2:#9AA8A2; --ink-3:#6B7873;
  --line:#26312D; --accent:#4CC9B0; --accent-ink:#08211B; --accent-soft:#1B2E29;
  --amber:#D9A85A; --amber-soft:#31281A; --sel:#4CC9B01F;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--ink);
  font:16px/1.45 -apple-system,'Segoe UI',system-ui,Roboto,sans-serif;
  -webkit-tap-highlight-color:transparent;
}
#app{max-width:640px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}

/* ---------- topo ---------- */
header{
  position:sticky;top:0;z-index:20;background:var(--bg);
  padding:10px 14px 8px;border-bottom:1px solid var(--line);
}
.brand{display:flex;align-items:baseline;gap:8px;margin:0 0 8px 2px}
.brand b{font-size:15px;letter-spacing:.02em}
.brand span{font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.08em}
.searchrow{display:flex;gap:8px}
#q{
  flex:1;min-width:0;padding:12px 14px;font-size:17px;color:var(--ink);
  background:var(--surface);border:1.5px solid var(--line);border-radius:var(--radius);
  outline:none;
}
#q:focus{border-color:var(--accent)}
#q::placeholder{color:var(--ink-3)}
#clearq{
  display:none;border:1.5px solid var(--line);background:var(--surface);color:var(--ink-2);
  border-radius:var(--radius);width:46px;font-size:18px;cursor:pointer;
}
.tabs{display:flex;gap:6px;margin-top:8px}
.tab{
  flex:1;padding:8px 0;text-align:center;font-size:13px;font-weight:600;cursor:pointer;
  color:var(--ink-2);background:none;border:none;border-bottom:2px solid transparent;
  text-transform:uppercase;letter-spacing:.06em;
}
.tab[aria-selected="true"]{color:var(--accent);border-bottom-color:var(--accent)}

/* ---------- listas ---------- */
main{flex:1;padding:10px 14px calc(90px + env(safe-area-inset-bottom))}
.hint{color:var(--ink-3);font-size:13.5px;text-align:center;margin:28px 12px;line-height:1.6}
.grouphead{
  font-size:11px;font-weight:700;color:var(--ink-3);text-transform:uppercase;
  letter-spacing:.09em;margin:16px 2px 6px;
}
.cid{
  display:flex;align-items:center;gap:12px;width:100%;text-align:left;cursor:pointer;
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:11px 12px;margin-bottom:6px;color:var(--ink);font:inherit;
}
.cid:active{background:var(--sel)}
.cid .code{
  font-family:var(--mono);font-size:14.5px;font-weight:700;color:var(--accent);
  min-width:52px;font-variant-numeric:tabular-nums;
}
.cid .nm{flex:1;font-size:14.5px;line-height:1.35}
.cid .n{font-size:11.5px;color:var(--ink-3);font-variant-numeric:tabular-nums;white-space:nowrap}
.cid .fav{color:var(--amber);font-size:14px}

/* ---------- detalhe ---------- */
.back{
  background:none;border:none;color:var(--accent);font-size:14px;font-weight:600;
  cursor:pointer;padding:6px 2px;margin:2px 0 4px;letter-spacing:.02em;
}
.dhead{display:flex;align-items:flex-start;gap:10px;margin-bottom:4px}
.dhead .dcode{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--accent)}
.dhead h2{margin:2px 0 0;font-size:17px;line-height:1.3;flex:1;text-wrap:balance}
.starbtn{
  background:none;border:1.5px solid var(--line);border-radius:8px;cursor:pointer;
  font-size:17px;line-height:1;padding:8px 10px;color:var(--ink-3);flex:none;
}
.starbtn.on{color:var(--amber);border-color:var(--amber)}
.dmeta{font-size:12px;color:var(--ink-3);margin:2px 0 14px}
.sect{margin:18px 0 8px;display:flex;align-items:baseline;gap:8px}
.sect h3{margin:0;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--ink-2)}
.sect .cnt{font-size:11.5px;color:var(--ink-3);font-variant-numeric:tabular-nums}
.sect.mine h3{color:var(--amber)}
.togglebtn{
  margin-left:auto;background:none;border:none;color:var(--accent);font-size:12.5px;
  font-weight:600;cursor:pointer;padding:2px 2px;
}
.proc{
  display:flex;gap:10px;align-items:flex-start;background:var(--surface);
  border:1px solid var(--line);border-radius:var(--radius);padding:10px 12px;
  margin-bottom:6px;cursor:pointer;
}
.proc.sel{background:var(--sel);border-color:var(--accent)}
.proc .ck{
  flex:none;width:20px;height:20px;margin-top:2px;border:1.5px solid var(--line);
  border-radius:6px;display:flex;align-items:center;justify-content:center;
  font-size:13px;color:var(--accent-ink);background:var(--surface);
}
.proc.sel .ck{background:var(--accent);border-color:var(--accent)}
.proc .body{flex:1;min-width:0}
.proc .pcode{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums}
.proc .pnm{font-size:13.5px;line-height:1.4;margin-top:1px}
.proc .pval{font-size:11.5px;color:var(--ink-3);margin-top:2px;font-variant-numeric:tabular-nums}
.proc .mine-tag{
  display:inline-block;font-size:10px;font-weight:700;color:var(--amber);
  background:var(--amber-soft);border-radius:4px;padding:1px 6px;margin-left:6px;
  text-transform:uppercase;letter-spacing:.05em;vertical-align:1px;
}
.rmbtn{background:none;border:none;color:var(--ink-3);font-size:15px;cursor:pointer;padding:2px 4px;flex:none}
.cbtn{
  display:block;background:none;border:none;color:var(--accent);font-size:12px;
  font-weight:600;cursor:pointer;padding:4px 0 0;letter-spacing:.01em;
}
.proc.sub{margin-left:24px;background:transparent}
.proc.sub.sel{background:var(--sel)}
.proc .qt{font-size:10.5px;color:var(--ink-3);margin-left:6px;font-variant-numeric:tabular-nums}
.addbtn{
  width:100%;padding:10px;background:none;border:1.5px dashed var(--line);
  border-radius:var(--radius);color:var(--amber);font-size:13.5px;font-weight:600;cursor:pointer;
}
textarea.note{
  width:100%;min-height:64px;padding:10px 12px;font:14px/1.5 inherit;font-family:inherit;
  color:var(--ink);background:var(--surface);border:1.5px solid var(--line);
  border-radius:var(--radius);resize:vertical;outline:none;
}
textarea.note:focus{border-color:var(--amber)}

/* ---------- barra de copiar ---------- */
#copybar{
  position:fixed;left:0;right:0;bottom:0;z-index:30;display:none;
  padding:10px 14px calc(10px + env(safe-area-inset-bottom));
  background:var(--surface);border-top:1px solid var(--line);
}
#copybar .inner{max-width:640px;margin:0 auto;display:flex;gap:8px;align-items:center}
#copybar .info{font-size:12.5px;color:var(--ink-2);flex:1;font-variant-numeric:tabular-nums}
#copybar button{
  border:none;border-radius:var(--radius);padding:11px 18px;font-size:14px;font-weight:700;
  cursor:pointer;letter-spacing:.02em;
}
#copyall{background:var(--accent);color:var(--accent-ink)}
#clearsel{background:none;border:1.5px solid var(--line);color:var(--ink-2)}

/* ---------- modal busca de procedimento ---------- */
#pmodal{
  position:fixed;inset:0;z-index:40;display:none;background:var(--bg);
  flex-direction:column;max-width:640px;margin:0 auto;
}
#pmodal .mh{padding:12px 14px;border-bottom:1px solid var(--line);display:flex;gap:8px}
#pq{
  flex:1;min-width:0;padding:11px 13px;font-size:16px;color:var(--ink);
  background:var(--surface);border:1.5px solid var(--line);border-radius:var(--radius);outline:none;
}
#pq:focus{border-color:var(--amber)}
#pmclose{border:1.5px solid var(--line);background:var(--surface);color:var(--ink-2);border-radius:var(--radius);width:46px;font-size:17px;cursor:pointer}
#plist{flex:1;overflow-y:auto;padding:10px 14px 20px}

.toast{
  position:fixed;left:50%;transform:translateX(-50%);bottom:calc(84px + env(safe-area-inset-bottom));
  z-index:50;background:var(--ink);color:var(--bg);font-size:13.5px;font-weight:600;
  padding:9px 16px;border-radius:20px;opacity:0;transition:opacity .18s;pointer-events:none;
  white-space:nowrap;
}
.toast.show{opacity:1}
button:focus-visible,.cid:focus-visible,.proc:focus-visible,#q:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
@media (prefers-reduced-motion: reduce){.toast{transition:none}}
footer.src{padding:6px 14px 14px;font-size:11px;color:var(--ink-3);text-align:center;line-height:1.5}
</style>

8,0],[70,0],[71,0],[72,0],[73,0],[74,0],[75,0],[76,0],[77,0],[78,0],[79,0],[80,0],[81,0],[82,0],[85,1],[103,2],[106,2]],[[62,0],[63,0],[64,0],[65,0],[66,0],[67,0],[68,0],[70,0],[71,0],[72,0],[73,0],[74,0],[75,0],[76,0],[77,0],[78,0],[79,0],[80,0],[81,0],[82,0],[86,0],[87,0],[88,0],[89,0],[90,0],[91,0],[92,0],[103,2],[106,2]],[[62,0],[63,0],[64,0],[65,0],[66,0],[67,0],[68,0],[70,0],[71,0],[72,0],[73,0],[74,0],[75,0],[76,0],[77,0],[78,0],[79,0],[80,0],[81,0],[82,0],[93,0],[94,0],[95,0],[96,0],[97,0],[98,0],[103,2],[106,2]]]};
const PROCS = DATA.procs, CIDS = DATA.cids, COMPAT = DATA.compat;
const $ = s => document.querySelector(s);
const main = $('#main');

/* ---------- persistência ---------- */
const store = {
  get(k, d){ try{ return JSON.parse(localStorage.getItem('cidorto:'+k)) ?? d }catch(e){ return d } },
  set(k, v){ try{ localStorage.setItem('cidorto:'+k, JSON.stringify(v)) }catch(e){} }
};
let favs   = store.get('favs', []);          // ["S72.0", ...]
let mine   = store.get('mine', {});          // {"S72.0":[procIdx,...]}
let notes  = store.get('notes', {});         // {"S72.0":"texto"}
let recent = store.get('recent', []);        // ["S72.0", ...]

/* ---------- índices ---------- */
const norm = s => s.normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase();
const cidByCode = new Map(CIDS.map((c,i)=>[c[0],i]));
const cidSearch = CIDS.map(c => norm(c[0].replace('.','') + ' ' + c[0] + ' ' + c[1]));
const procSearch = PROCS.map(p => norm(p[0].replace(/[.\-]/g,'') + ' ' + p[0] + ' ' + p[1]));
const money = v => v > 0 ? 'R$ ' + v.toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?=,))/g,'.') : 'sem valor SH/SA/SP';
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

/* ---------- estado ---------- */
let view = {name:'list'};        // {name:'list'} | {name:'detail', cid:idx}
let tab = 'busca';
let sel = new Map();             // procIdx -> true  (seleção p/ copiar)
let selCid = null;               // código do CID da seleção atual
let showOthers = false;
let openCompat = new Set();      // procIdx com secundários expandidos

/* ---------- toast ---------- */
let toastT;
function toast(msg){
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toastT); toastT = setTimeout(()=>t.classList.remove('show'), 1600);
}
async function copyText(txt, msg){
  try{ await navigator.clipboard.writeText(txt); toast(msg); }
  catch(e){
    const ta = document.createElement('textarea'); ta.value = txt; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); ta.remove(); toast(msg);
  }
}

/* ---------- render: lista ---------- */
function cidRow(i){
  const c = CIDS[i];
  const nProc = c[2].length + (mine[c[0]]||[]).length;
  const isFav = favs.includes(c[0]);
  return `<button class="cid" data-cid="${i}">
    <span class="code">${c[0]}</span>
    <span class="nm">${esc(c[1])}</span>
    ${isFav ? '<span class="fav">★</span>' : ''}
    <span class="n">${nProc ? nProc + ' proc.' : '—'}</span>
  </button>`;
}
function renderList(){
  const q = norm($('#q').value.trim());
  $('#clearq').style.display = q ? 'block' : 'none';
  let html = '';
  if (tab === 'fav'){
    const items = favs.map(code => cidByCode.get(code)).filter(i => i !== undefined);
    html = items.length
      ? `<div class="grouphead">Favoritos (${items.length})</div>` + items.map(cidRow).join('')
      : `<div class="hint">Nenhum favorito ainda.<br>Abra um CID e toque em ☆ para fixá-lo aqui.</div>`;
  } else if (!q){
    const rec = recent.map(code => cidByCode.get(code)).filter(i => i !== undefined).slice(0,8);
    html = rec.length
      ? `<div class="grouphead">Consultados recentemente</div>` + rec.map(cidRow).join('')
      : `<div class="hint">Digite o código (ex.: <b>S72</b>) ou o nome da doença<br>(ex.: <b>fratura do colo do fêmur</b>).<br><br>Cobertura: capítulos M, S e T do CID-10,<br>mononeuropatias (G50–G59) e malformações<br>osteomusculares congênitas (Q65–Q79).</div>`;
  } else {
    const terms = q.split(/\s+/).filter(Boolean);
    const hits = [];
    for (let i = 0; i < CIDS.length && hits.length < 80; i++){
      if (terms.every(t => cidSearch[i].includes(t))) hits.push(i);
    }
    html = hits.length
      ? `<div class="grouphead">${hits.length}${hits.length===80?'+':''} resultado${hits.length>1?'s':''}</div>` + hits.map(cidRow).join('')
      : `<div class="hint">Nada encontrado para “${esc($('#q').value.trim())}”.<br>Tente parte do nome ou só a categoria (ex.: S82).</div>`;
  }
  main.innerHTML = html;
}

/* ---------- render: detalhe ---------- */
function procRow(pi, opts){
  opts = opts || {};
  const p = PROCS[pi];
  const isSel = sel.has(pi);
  const nSec = !opts.sub && COMPAT[pi] ? COMPAT[pi].length : 0;
  return `<div class="proc${isSel?' sel':''}${opts.sub?' sub':''}" data-proc="${pi}" role="checkbox" aria-checked="${isSel}" tabindex="0">
    <span class="ck">${isSel?'✓':''}</span>
    <span class="body">
      <span class="pcode">${p[0]}</span>${opts.mine ? '<span class="mine-tag">meu</span>' : ''}${opts.qt > 1 ? `<span class="qt">até ${opts.qt}×</span>` : ''}
      <div class="pnm">${esc(p[1])}</div>
      <div class="pval">${money(p[3])}</div>
      ${nSec ? `<button class="cbtn" data-tgc="${pi}">${openCompat.has(pi)?'▾':'▸'} ${nSec} código${nSec>1?'s':''} secundário${nSec>1?'s':''} compatíve${nSec>1?'is':'l'}</button>` : ''}
    </span>
    ${opts.mine ? `<button class="rmbtn" data-rm="${pi}" aria-label="Remover vínculo">✕</button>` : ''}
  </div>`;
}
function procBlock(pi, opts){
  let html = procRow(pi, opts);
  if (openCompat.has(pi) && COMPAT[pi]){
    html += COMPAT[pi].map(([si, qt]) => procRow(si, {sub:true, qt})).join('');
  }
  return html;
}
function renderDetail(){
  const ci = view.cid, c = CIDS[ci], code = c[0];
  if (selCid !== code){ sel.clear(); selCid = code; }
  const isFav = favs.includes(code);
  const myIdxs = mine[code] || [];
  const mySet = new Set(myIdxs);
  const surg = c[2].filter(pi => PROCS[pi][2] === '04' && !mySet.has(pi));
  const others = c[2].filter(pi => PROCS[pi][2] !== '04' && !mySet.has(pi));
  let html = `<button class="back">‹ Voltar à busca</button>
  <div class="dhead">
    <div><div class="dcode">${code}</div></div>
    <h2>${esc(c[1])}</h2>
    <button class="starbtn${isFav?' on':''}" id="dstar" aria-label="Favorito">${isFav?'★':'☆'}</button>
  </div>
  <div class="dmeta">Toque nos procedimentos para selecionar e copie para a descrição cirúrgica. Toque no código do CID acima para copiá-lo.</div>`;

  html += `<div class="sect mine"><h3>Meus vínculos</h3><span class="cnt">${myIdxs.length||''}</span></div>`;
  html += myIdxs.map(pi => procBlock(pi, {mine:true})).join('');
  html += `<button class="addbtn" id="addmine">+ Adicionar procedimento a este CID</button>`;

  html += `<div class="sect"><h3>Cirúrgicos compatíveis · grupo 04</h3><span class="cnt">${surg.length}</span></div>`;
  html += surg.length ? surg.map(pi => procBlock(pi)).join('')
        : `<div class="hint" style="margin:10px">Nenhum procedimento cirúrgico vinculado a este CID na SIGTAP.</div>`;

  if (others.length){
    html += `<div class="sect"><h3>Outros compatíveis (clínicos, diagnósticos…)</h3><span class="cnt">${others.length}</span>
      <button class="togglebtn" id="tglothers">${showOthers?'ocultar':'mostrar'}</button></div>`;
    if (showOthers) html += others.map(pi => procBlock(pi)).join('');
  }

  html += `<div class="sect mine"><h3>Anotações</h3></div>
    <textarea class="note" id="dnote" placeholder="Suas observações para este CID (técnica preferida, material, exigências do hospital…)">${esc(notes[code]||'')}</textarea>`;
  main.innerHTML = html;
  const noteEl = $('#dnote');
  noteEl.addEventListener('input', () => { notes[code] = noteEl.value; store.set('notes', notes); });
  updateCopybar();
}

/* ---------- barra de cópia ---------- */
function updateCopybar(){
  const bar = $('#copybar');
  if (view.name === 'detail' && sel.size){
    bar.style.display = 'block';
    $('#selinfo').textContent = sel.size + ' procedimento' + (sel.size>1?'s':'') + ' selecionado' + (sel.size>1?'s':'');
  } else bar.style.display = 'none';
}
function buildCopyText(){
  const c = CIDS[view.cid];
  const lines = ['CID-10: ' + c[0] + ' — ' + c[1]];
  [...sel.keys()].sort((a,b)=>PROCS[a][0]<PROCS[b][0]?-1:1)
    .forEach(pi => lines.push(PROCS[pi][0] + ' — ' + PROCS[pi][1]));
  return lines.join('\n');
}

/* ---------- modal procedimento ---------- */
function openPmodal(){
  $('#pmodal').style.display = 'flex';
  $('#pq').value = ''; renderPlist(); $('#pq').focus();
}
function renderPlist(){
  const q = norm($('#pq').value.trim());
  const terms = q.split(/\s+/).filter(Boolean);
  let html = '';
  if (!terms.length){
    html = '<div class="hint">Busque por nome (ex.: <b>artroplastia</b>, <b>osteossíntese</b>)<br>ou pelo código SIGTAP.</div>';
  } else {
    const hits = [];
    for (let i = 0; i < PROCS.length && hits.length < 60; i++){
      if (terms.every(t => procSearch[i].includes(t))) hits.push(i);
    }
    html = hits.map(pi => {
      const p = PROCS[pi];
      return `<button class="cid" data-pick="${pi}">
        <span class="body" style="flex:1;text-align:left">
          <span class="pcode" style="font-family:var(--mono);font-size:13px;font-weight:700;color:var(--accent)">${p[0]}</span>
          <div class="pnm" style="font-size:13.5px">${esc(p[1])}</div>
        </span></button>`;
    }).join('') || '<div class="hint">Nenhum procedimento encontrado.</div>';
  }
  $('#plist').innerHTML = html;
}

/* ---------- navegação / eventos ---------- */
function openCid(i){
  view = {name:'detail', cid:i}; showOthers = false; openCompat = new Set();
  const code = CIDS[i][0];
  recent = [code, ...recent.filter(c => c !== code)].slice(0,12);
  store.set('recent', recent);
  window.scrollTo(0,0); renderDetail();
}
function backToList(){ view = {name:'list'}; sel.clear(); selCid = null; renderList(); updateCopybar(); }

$('#q').addEventListener('input', () => { if (view.name!=='list') { view={name:'list'}; } renderList(); });
$('#clearq').addEventListener('click', () => { $('#q').value=''; renderList(); $('#q').focus(); });
$('#tab-busca').addEventListener('click', () => { tab='busca'; setTab(); });
$('#tab-fav').addEventListener('click', () => { tab='fav'; setTab(); });
function setTab(){
  $('#tab-busca').setAttribute('aria-selected', tab==='busca');
  $('#tab-fav').setAttribute('aria-selected', tab==='fav');
  view = {name:'list'}; renderList(); updateCopybar();
}

main.addEventListener('click', e => {
  const rm = e.target.closest('[data-rm]');
  if (rm){
    const pi = +rm.dataset.rm, code = CIDS[view.cid][0];
    mine[code] = (mine[code]||[]).filter(x => x !== pi);
    if (!mine[code].length) delete mine[code];
    store.set('mine', mine); sel.delete(pi); renderDetail(); return;
  }
  const tgc = e.target.closest('[data-tgc]');
  if (tgc){
    const pi = +tgc.dataset.tgc;
    openCompat.has(pi) ? openCompat.delete(pi) : openCompat.add(pi);
    renderDetail(); return;
  }
  const cid = e.target.closest('[data-cid]');
  if (cid){ openCid(+cid.dataset.cid); return; }
  const proc = e.target.closest('[data-proc]');
  if (proc){
    const pi = +proc.dataset.proc;
    sel.has(pi) ? sel.delete(pi) : sel.set(pi, true);
    proc.classList.toggle('sel', sel.has(pi));
    proc.setAttribute('aria-checked', sel.has(pi));
    proc.querySelector('.ck').textContent = sel.has(pi) ? '✓' : '';
    updateCopybar(); return;
  }
  if (e.target.closest('.back')){ backToList(); return; }
  if (e.target.id === 'dstar'){
    const code = CIDS[view.cid][0];
    favs = favs.includes(code) ? favs.filter(c => c!==code) : [...favs, code];
    store.set('favs', favs); renderDetail(); return;
  }
  if (e.target.id === 'addmine'){ openPmodal(); return; }
  if (e.target.id === 'tglothers'){ showOthers = !showOthers; renderDetail(); return; }
  if (e.target.closest('.dcode')){
    copyText(CIDS[view.cid][0] + ' — ' + CIDS[view.cid][1], 'CID copiado'); return;
  }
});
main.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'Enter'){
    const proc = e.target.closest('[data-proc]');
    if (proc){ e.preventDefault(); proc.click(); }
  }
});

$('#copyall').addEventListener('click', () => copyText(buildCopyText(), 'Copiado para a descrição'));
$('#clearsel').addEventListener('click', () => {
  sel.clear();
  main.querySelectorAll('.proc.sel').forEach(el => {
    el.classList.remove('sel'); el.setAttribute('aria-checked','false');
    el.querySelector('.ck').textContent='';
  });
  updateCopybar();
});

$('#pq').addEventListener('input', renderPlist);
$('#pmclose').addEventListener('click', () => $('#pmodal').style.display='none');
$('#plist').addEventListener('click', e => {
  const b = e.target.closest('[data-pick]');
  if (!b) return;
  const pi = +b.dataset.pick, code = CIDS[view.cid][0];
  mine[code] = mine[code] || [];
  if (!mine[code].includes(pi)) mine[code].push(pi);
  store.set('mine', mine);
  $('#pmodal').style.display = 'none';
  renderDetail(); toast('Vínculo adicionado');
});

renderList();
</script>
